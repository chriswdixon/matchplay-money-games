name: Visual Regression

# Runs Playwright screenshot diffs on every PR and on pushes to main.
# Fails the build when a snapshot drifts from the committed baseline
# (e.g. an accidental color/gradient change to the homepage hero).
#
# Updating baselines:
#   - Locally:   bun run test:visual:update && commit tests/visual/**/__screenshots__
#   - Remotely:  Actions → "Visual Regression" → "Run workflow" with
#                update_baselines = true. The job re-runs Playwright with
#                --update-snapshots and opens a PR containing the new PNGs
#                for you to review and merge.
#
# Baselines are platform-specific. This workflow runs on
# ubuntu-latest, so commit the Linux baselines produced here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: "Regenerate snapshot baselines and open a PR with the changes"
        type: boolean
        default: false

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Playwright snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # needed to push the baselines branch
      pull-requests: write  # needed to open the review PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium webkit

      - name: Install system deps for cached browsers
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium webkit

      # ---------- Normal verification run ----------
      - name: Run visual regression tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.update_baselines != true }}
        run: bun run test:visual
        env:
          CI: "true"
          # Public-route snapshots only — auth-gated specs auto-skip when
          # these creds are unset, which is the safe default for CI.
          # To exercise authenticated screens, add these as repo secrets:
          # PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          # PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          # PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          # PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          # PLAYWRIGHT_MATCH_ID: ${{ secrets.PLAYWRIGHT_MATCH_ID }}

      # ---------- On-demand baseline refresh ----------
      - name: Regenerate baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_baselines == true }}
        run: bun run test:visual:update
        env:
          CI: "true"

      - name: Open baseline-update PR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_baselines == true }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(visual): refresh snapshot baselines"
          title: "chore(visual): refresh snapshot baselines"
          branch: chore/visual-baselines-${{ github.run_id }}
          base: ${{ github.ref_name }}
          delete-branch: true
          add-paths: |
            tests/**/__screenshots__/**
            tests/visual/**/*.png
          body: |
            Automated baseline refresh triggered from
            [run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            by @${{ github.actor }} on `${{ github.ref_name }}`.

            ### Review checklist
            - [ ] Each updated PNG reflects an **intentional** UI change
            - [ ] No unrelated screens drifted (background images, fonts, copy)
            - [ ] Light/dark and mobile/desktop variants all look correct

            Merge this PR to adopt the new baselines. After merge, future
            verification runs will diff against these images.

      # ---------- Artifacts ----------
      - name: Upload Playwright report (diffs + traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload diff snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results
          retention-days: 14
